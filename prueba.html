<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="PREBA.css" type="text/css">
    <title>Receta de la tortilla francesa</title>
    <style>
        h1 {
            background: blue;
            color: white;
        }
        h2 {
            background: red;
            color: white;
        }
        p {
            font-family: Arial, Helvetica, sans-serif;
            font_size: 1.15em;
            text-align: center;
            font-weight: bold;
        }
        ul {
            font-style: italic;
            text-shadow: 2px 2px 4px red;
        }
        ol {
            text-shadow: 2px 2px 5px darkblue;
        }
        .element {
            width: 200px;
            height: 200px;
            background: grey;
            position: re;
            transition:
                    width 4s,
                    background 1s;
        }

        .element:hover {
            width: 600px;
            background: deeppink;
            transition: 1s;
        }
        .element:active {
            background: black;
        }
    </style>
</head>
<body>
<h1>Receta de la tortilla francesa</h1>

<h2>Ingredientes:</h2>

<ul>
    <li>Huevos</li>
    <li>Aceite</li>
    <li>Sal</li>
</ul>

<h2>Preparación</h2>

<ol>
    <li>Calentar el aceite en una sartén</li>
    <li>Cascar el huevo y batirlo</li>
    <li>Verter el huevo batido en la sartén</li>
    <li>Esperar un par de minutos, voltear y volver a esperar</li>
</ol>

<p>Servir con mayonesa, tomate o jamón</p>

<div class="element"></div>

</body>
</html>
